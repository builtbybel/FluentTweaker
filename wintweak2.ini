Category=UI
Description=Disables the snap layout flyout that appears when hovering over the maximize button.
Type=Registry
Hive=HKEY_CURRENT_USER
Key=Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
ValueName=EnableSnapAssistFlyout
ValueType=DWORD
RecommendedValue=0
DefaultValue=1
RestartRequired=false
RequiresAdmin=false

[Set Start Menu to More Pins Layout]
Category=UI
Description=Sets the Windows 11 Start menu to show more pinned apps and fewer recommendations.
Type=Registry
Hive=HKEY_CURRENT_USER
Key=Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
ValueName=Start_Layout
ValueType=DWORD
RecommendedValue=1
DefaultValue=0
RestartRequired=false
RequiresAdmin=false
OsVersion=11

[Disable Transparency Effects]
Category=UI
Description=Turns off transparency/blur effects in windows and the taskbar for better performance on older hardware.
Type=Registry
Hive=HKEY_CURRENT_USER
Key=Software\Microsoft\Windows\CurrentVersion\Themes\Personalize
ValueName=EnableTransparency
ValueType=DWORD
RecommendedValue=0
DefaultValue=1
RestartRequired=false
RequiresAdmin=false
